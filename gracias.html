<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex">
  <title>Mensaje enviado — ISMAEL S.A.</title>
  <style>
    :root {
      --green: #2E8C66;
      --dark: #1F2924;
      --fg: #EAF1ED;
      --fg-soft: rgba(234,241,237,0.65);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: Arial, Helvetica, sans-serif;
      background: var(--dark);
      color: var(--fg);
      display: flex; align-items: center; justify-content: center;
      padding: 24px; text-align: center;
      min-height: 100vh;
    }
    .card { max-width: 440px; width: 100%; }
    .check {
      width: 76px; height: 76px; margin: 0 auto 24px;
      border-radius: 50%;
      background: rgba(46,140,102,0.15);
      border: 2px solid var(--green);
      display: flex; align-items: center; justify-content: center;
    }
    .check svg { width: 38px; height: 38px; stroke: var(--green); }
    h1 { font-size: 26px; font-weight: 800; letter-spacing: -0.02em; margin-bottom: 12px; }
    p { font-size: 15px; line-height: 1.6; color: var(--fg-soft); margin-bottom: 28px; }
    .btn {
      display: inline-block;
      background: var(--green); color: #fff;
      font-size: 15px; font-weight: 600;
      text-decoration: none;
      padding: 13px 28px; border-radius: 8px;
      transition: opacity 0.15s;
    }
    .btn:hover { opacity: 0.9; }
    .brand { margin-top: 40px; font-size: 12px; letter-spacing: 0.12em; text-transform: uppercase; color: rgba(234,241,237,0.4); }
  </style>
</head>
<body>
  <main class="card">
    <div class="check" aria-hidden="true">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
    </div>
    <h1>¡Mensaje enviado!</h1>
    <p>Gracias por contactarte con <strong>ISMAEL S.A.</strong> Recibimos tu mensaje correctamente y te responderemos a la brevedad.</p>
    <a class="btn" href="/index.html">Volver al inicio</a>
    <div class="brand">ISMAEL S.A. — San Juan, Argentina</div>
  </main>
</body>
</html>
